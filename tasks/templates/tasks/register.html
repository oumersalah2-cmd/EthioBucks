<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ethio Bucks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { width: 100%; max-width: 450px; padding: 30px; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .btn-success { border-radius: 10px; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="register-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-success">Create Account</h2>
        <p class="text-muted">Join Ethio Bucks and start earning.</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-success w-100 mb-3">Create My Account</button>
    </form>

    <div class="text-center">
        <p class="small text-muted">Already have an account? <a href="{% url 'tasks:login' %}" class="text-success fw-bold text-decoration-none">Login here</a></p>
    </div>
</div>

</body>
</html>
