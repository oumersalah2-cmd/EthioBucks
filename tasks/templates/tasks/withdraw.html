<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Funds - Ethio Bucks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .withdraw-card { width: 100%; max-width: 400px; padding: 30px; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .btn-withdraw { background: #28a745; color: white; border: none; border-radius: 10px; padding: 12px; font-weight: bold; }
        .balance-box { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="withdraw-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-success">Withdraw</h2>
        <p class="text-muted">Enter your payment details</p>
    </div>

    <div class="balance-box">
        <small class="text-muted">Available Balance</small>
        <h3 class="fw-bold text-success mb-0">{{ user.profile.balance }} ETB</h3>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label small fw-bold">Amount (ETB)</label>
            <input type="number" name="amount" class="form-control" placeholder="Min 10.00" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Phone Number (Telebirr/CBE)</label>
            <input type="text" name="phone_number" class="form-control" placeholder="09..." required>
        </div>
        <button type="submit" class="btn btn-withdraw w-100 shadow-sm">Submit Request</button>
    </form>
    
    <div class="text-center mt-3">
        <a href="{% url 'tasks:task_list' %}" class="text-muted text-decoration-none small">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
