<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Funds - Ethio Bucks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #eef7f2 0%, #f8fafc 55%, #edf2f8 100%);
            padding: 18px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        .withdraw-card {
            width: 100%;
            max-width: 430px;
            padding: 28px;
            border: none;
            border-radius: 18px;
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.1);
            background: white;
        }
        .btn-withdraw {
            background: #1f9d55;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }
        .btn-withdraw:hover {
            background: #177742;
            color: white;
        }
        .balance-box {
            background: #ecfdf3;
            border: 1px solid #bbf7d0;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 12px;
        }
        @media (max-width: 575.98px) {
            .withdraw-card {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

<div class="withdraw-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-success">Withdraw</h2>
        <p class="text-muted">Enter your payment details</p>
    </div>

    <div class="balance-box">
        <small class="text-muted">Available Balance</small>
        <h3 class="fw-bold text-success mb-0">{{ user.profile.balance }} ETB</h3>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label small fw-bold">Amount (ETB)</label>
            <input type="number" name="amount" class="form-control" placeholder="Min 10.00" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Phone Number (Telebirr/CBE)</label>
            <input type="text" name="phone_number" class="form-control" placeholder="09..." required>
        </div>
        <button type="submit" class="btn btn-withdraw w-100 shadow-sm">Submit Request</button>
    </form>
    
    <div class="text-center mt-3">
        <a href="{% url 'tasks:task_list' %}" class="text-muted text-decoration-none small">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
